<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gachapop Gumdrop Pokédex</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f8f8f6;color:#1a1a1a;min-height:100vh}
  .page{padding:1.5rem 1rem;max-width:980px;margin:0 auto}
  h1{font-size:22px;font-weight:600;margin-bottom:4px;color:#1a1a1a}
  .subtitle{font-size:14px;color:#666;margin-bottom:1.5rem}
  .tabs{display:flex;gap:2px;margin-bottom:1.5rem;border-bottom:1px solid #e0e0e0}
  .tab{padding:8px 16px;font-size:14px;cursor:pointer;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none}
  .tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:1.5rem}
  .stat{background:#fff;border-radius:8px;padding:12px 14px;border:1px solid #e8e8e8}
  .stat-label{font-size:12px;color:#888;margin-bottom:4px}
  .stat-value{font-size:22px;font-weight:600;color:#1a1a1a}
  .controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
  .controls input,.controls select{flex:1;min-width:130px;height:36px;border-radius:8px;border:1px solid #ddd;padding:0 10px;font-size:14px;background:#fff;color:#1a1a1a}
  .btn{height:36px;padding:0 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px;cursor:pointer;white-space:nowrap}
  .btn:hover{background:#f0f0f0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
  .card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:14px;transition:border-color .15s}
  .card:hover{border-color:#aaa}
  .card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .card-img{width:64px;height:64px;border-radius:8px;background:#f0f0f0;border:1px solid #e8e8e8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#999;text-align:center;overflow:hidden}
  .card-img img{width:100%;height:100%;object-fit:cover;border-radius:8px}
  .card-name{font-size:15px;font-weight:600;color:#1a1a1a}
  .card-actions{margin-left:auto;display:flex;gap:4px;flex-shrink:0}
  .fil-section{margin-top:8px;border-top:1px solid #f0f0f0;padding-top:8px}
  .fil-title{font-size:11px;color:#999;margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase}
  .filament-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .fil-dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.12)}
  .fil-name{font-size:12px;color:#1a1a1a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .fil-badge{font-size:10px;padding:1px 6px;border-radius:10px;background:#f3eeff;color:#7c4dbe;border:1px solid #e0d0f8;white-space:nowrap}
  .fil-basic{font-size:10px;color:#999}
  
  
  
  
  
  
  
  
  
  .empty{text-align:center;padding:3rem 1rem;color:#999;font-size:14px}
  .palette-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
  .swatch{border-radius:8px;overflow:hidden;border:1px solid #e8e8e8}
  .swatch.used{border-color:#1a1a1a}
  .swatch-color{height:52px}
  .swatch-info{padding:5px 7px;background:#fff}
  .swatch-name{font-size:10px;font-weight:600;color:#1a1a1a;line-height:1.3}
  .swatch-hex{font-size:9px;color:#888;font-family:monospace}
  
  
  
  
  
  
  
</style>
</head>

function norm(raw){
  if(!raw||raw.trim()==='N/A'||!raw.trim())return null;
  const s=raw.trim(),isMatte=s.toLowerCase().includes('matte');
  let clean=s.replace(/\s*\(matte\)/i,'').trim();
  const a={'Ashe Gray':'Ash Gray','Scarlett Red':'Scarlet Red','Liliac Purple':'Lilac Purple','Biege':'Beige','Grey':'Gray','White':'Jade White'};
  if(a[clean])clean=a[clean];
  const m=FILAMENTS.find(f=>f.name.toLowerCase()===clean.toLowerCase());
  return{name:m?m.name:clean,matte:isMatte};
}
function getF(n){return FILAMENTS.find(f=>f.name===n)||{name:n,hex:'#aaa'}}

let pokemon=RAW.map((row,i)=>({id:i+1,name:row[0],image:BAKED_IMAGES[row[0]]||'',filaments:row.slice(1).map(norm).filter(Boolean)}));
let tab='figures',search='';

function render(){
  const app=document.getElementById('app');
  const filtered=pokemon.filter(p=>{
    const s=search.toLowerCase();
    return(!s||p.name.toLowerCase().includes(s));
  });
  const allFils=[...new Set(pokemon.flatMap(p=>p.filaments.map(f=>f.name)))];
  const matteCount=pokemon.flatMap(p=>p.filaments).filter(f=>f.matte).length;

  let h=`<h1>🎰 Gachapop Gumdrop Pokédex</h1>
  <p class="subtitle">Mini figurine tracker — filament colors & reorder links</p>
  <div class="tabs">
    <button class="tab${tab==='figures'?' active':''}" onclick="tab='figures';render()">My Figures (${pokemon.length})</button>
    <button class="tab${tab==='palette'?' active':''}" onclick="tab='palette';render()">Filament Palette</button>
  </div>`;

  if(tab==='palette'){
    const inUse=new Set(pokemon.flatMap(p=>p.filaments.map(f=>f.name)));
    h+=`<p style="font-size:14px;color:#666;margin-bottom:1rem">${FILAMENTS.length} colors in your palette · <b>${inUse.size} in use ✓</b></p><div class="palette-grid">`;
    FILAMENTS.forEach(f=>{
      const used=inUse.has(f.name);
      h+=`<div class="swatch${used?' used':''}">
        <div class="swatch-color" style="background:${f.hex};${f.hex==='#FFFFFF'?'border-bottom:1px solid #e8e8e8':''}"></div>
        <div class="swatch-info"><div class="swatch-name">${f.name}${used?' ✓':''}</div><div class="swatch-hex">${f.hex}</div></div>
      </div>`;
    });
    h+=`</div>`;
    app.innerHTML=h;
    return;
  }

  h+=`<div class="stats">
    <div class="stat"><div class="stat-label">Total figures</div><div class="stat-value">${pokemon.length}</div></div>
    <div class="stat"><div class="stat-label">Unique filaments</div><div class="stat-value">${allFils.length}</div></div>
    <div class="stat"><div class="stat-label">Matte uses</div><div class="stat-value">${matteCount}</div></div>
  </div>
  <div class="controls">
    <input type="text" placeholder="Search figures..." value="${search}" oninput="search=this.value;render()">
  </div>`;

  if(!filtered.length){h+=`<div class="empty">No figures found.</div>`;}
  else{
    h+=`<div class="grid">`;
    filtered.forEach(p=>{
      h+=`<div class="card">
        <div class="card-top">
          <div class="card-img">${p.image?`<div style="width:100%;height:100%;background-image:url('${p.image}');background-size:cover;background-position:center;border-radius:8px"></div>`:'<span>No photo</span>'}</div>
          <div style="flex:1;min-width:0"><div class="card-name">${p.name}</div></div>
        </div>
        <div class="fil-section">
          <div class="fil-title">Filaments</div>
          ${p.filaments.map(f=>{const fd=getF(f.name);return`<div class="filament-row"><div class="fil-dot" style="background:${fd.hex}"></div><span class="fil-name">${f.name}</span>${f.matte?`<span class="fil-badge">Matte</span>`:`<span class="fil-basic">PLA Basic</span>`}</div>`}).join('')}
        </div>
      </div>`;
    });
    h+=`</div>`;
  }
  app.innerHTML=h;
}










render();
</script>
</body>
</html>
